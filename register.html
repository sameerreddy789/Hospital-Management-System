<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png">
  <title>Register - NeuroCare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    /* ============================================================
       Registration Page — Premium Dark Design
       ============================================================ */
    .register-page {
      min-height: 100vh;
      background: linear-gradient(160deg, #f0f4ff 0%, #e8eeff 50%, #f5f0ff 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-y: auto;
    }

    .register-page::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
      top: -150px;
      right: -100px;
      border-radius: 50%;
    }

    .register-page::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
      bottom: -100px;
      left: -80px;
      border-radius: 50%;
    }

    .register-container {
      max-width: 680px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Brand */
    .register-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2.5rem;
    }

    .register-brand img {
      max-height: 48px;
      border-radius: 100px;
    }

    .register-brand span {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 0.02em;
    }

    /* Headings */
    .register-container h1 {
      color: #1e293b;
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .register-container>div>p,
    #roleSelection>p {
      color: #64748b;
      text-align: center;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    /* Role Cards Grid */
    .role-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .role-card {
      background: #ffffff;
      border: 1.5px solid rgba(226, 232, 240, 0.8);
      border-radius: 20px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.165, 0.84, 0.44, 1);
      position: relative;
      overflow: hidden;
      font-family: inherit;
      color: inherit;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    .role-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }

    .role-card:hover.role-blue {
      border-color: rgba(59, 130, 246, 0.5);
    }

    .role-card:hover.role-green {
      border-color: rgba(16, 185, 129, 0.5);
    }

    .role-card:hover.role-purple {
      border-color: rgba(139, 92, 246, 0.5);
    }

    /* Role Icon */
    .role-card-icon {
      width: 68px;
      height: 68px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      transition: all 0.3s ease;
    }

    .role-card-icon svg {
      width: 34px;
      height: 34px;
    }

    .role-icon-blue {
      background: rgba(59, 130, 246, 0.12);
      color: #3b82f6;
    }

    .role-icon-green {
      background: rgba(16, 185, 129, 0.12);
      color: #10b981;
    }

    .role-icon-purple {
      background: rgba(139, 92, 246, 0.12);
      color: #8b5cf6;
    }

    /* Icon hover fills */
    .role-card:hover .role-icon-blue {
      background: #3b82f6;
      color: #fff;
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
    }

    .role-card:hover .role-icon-green {
      background: #10b981;
      color: #fff;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.35);
    }

    .role-card:hover .role-icon-purple {
      background: #8b5cf6;
      color: #fff;
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.35);
    }

    .role-card h3 {
      color: #1e293b;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .role-card p {
      color: #64748b;
      font-size: 0.85rem;
      line-height: 1.5;
      margin: 0;
    }

    .role-card-badge {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: rgba(245, 158, 11, 0.12);
      color: #d97706;
    }

    /* Auth Links */
    .auth-links {
      text-align: center;
      margin-top: 1.5rem;
    }

    .auth-links a {
      color: #3b82f6;
      font-size: 0.9rem;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .auth-links a:hover {
      color: #2563eb;
      text-decoration: underline;
    }

    /* Back link */
    .back-link {
      background: none;
      border: none;
      color: #3b82f6;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 0 2px 0;
      margin-bottom: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
      font-family: inherit;
      position: relative;
    }

    .back-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1.5px;
      background: #f59e0b;
      transition: width 0.3s ease;
    }

    .back-link:hover::after {
      width: 100%;
    }

    /* Registration Form Card */
    .register-form-card {
      background: #ffffff;
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .register-form-card h1 {
      margin-bottom: 0.25rem;
    }

    #roleSubtext {
      color: #64748b;
      text-align: center;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .gradient-text {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Form elements */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      color: #334155;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      color: #1e293b;
      font-size: 0.95rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      outline: none;
      font-family: inherit;
      box-sizing: border-box;
    }

    .form-group input::placeholder {
      color: #94a3b8;
    }

    .form-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 3rem;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: #94a3b8;
    }

    /* Submit button */
    .register-form-card .btn-primary {
      width: 100%;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      margin-top: 0.5rem;
      cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      border: none;
      transition: background 0.1s ease, transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 4px 10px rgba(139, 92, 246, 0.2);
    }

    .register-form-card .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.35);
      filter: brightness(1.1);
    }

    .register-form-card .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 2px 5px rgba(139, 92, 246, 0.2);
      filter: brightness(0.9);
    }

    .btn-loading {
      opacity: 0.7;
      pointer-events: none;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }

    .register-form-card .auth-links {
      margin-top: 1.5rem;
    }

    .register-form-card .auth-links a {
      display: block;
      margin-bottom: 0.5rem;
    }

    /* Message */
    .message {
      padding: 0.85rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }

    .message-error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
    }

    .message-success {
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: #10b981;
    }

    .message-info {
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.25);
      color: #3b82f6;
    }

    /* Responsive */
    @media (max-width: 576px) {
      .role-cards {
        grid-template-columns: 1fr;
      }

      .register-container {
        max-width: 100%;
      }

      .register-form-card {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>

<body class="register-page">
  <div class="register-container">
    <!-- Brand -->
    <div class="register-brand">
      <img src="logo.png" alt="NeuroCare Logo">
      <span>NeuroCare</span>
    </div>

    <!-- Step 1: Role Selection -->
    <div id="roleSelection">
      <h1>Create Account</h1>
      <p>Select your role to get started</p>
      <div class="role-cards">
        <button class="role-card role-blue" data-role="patient" type="button">
          <div class="role-card-icon role-icon-blue">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
          <h3>Patient</h3>
          <p>Request consultations &amp; view health records</p>
        </button>
        <button class="role-card role-green" data-role="doctor" type="button">
          <div class="role-card-icon role-icon-green">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5" />
            </svg>
          </div>
          <h3>Doctor</h3>
          <p>Manage patients &amp; provide care</p>
          <span class="role-card-badge">Requires Approval</span>
        </button>

      </div>
      <div class="auth-links">
        <a href="login.html">Already have an account? Sign In</a>
      </div>
    </div>

    <!-- Step 2: Registration Form -->
    <div id="registerStep" style="display:none;">
      <div class="register-form-card">
        <button type="button" class="back-link" id="backToRoles">&larr; Back to role selection</button>
        <h1>Register as <span id="roleLabel" class="gradient-text"></span></h1>
        <p id="roleSubtext"></p>
        <div id="approvalNotice" class="message message-info" style="display:none;">
          &#128274; Your account will require admin approval before you can sign in.
        </div>
        <div id="message" class="message" style="display:none;"></div>
        <form id="registerForm" novalidate>
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" autocomplete="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <div class="form-group" id="specializationGroup" style="display:none;">
            <label for="specialization">Specialization</label>
            <input type="text" id="specialization" name="specialization"
              placeholder="e.g. Surgical Neurology, Radiation Neurology">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" name="password" placeholder="Min 6 characters"
                autocomplete="new-password" required>
              <button type="button" class="password-toggle" aria-label="Toggle password visibility">&#128065;</button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrapper">
              <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password"
                autocomplete="new-password" required>
              <button type="button" class="password-toggle" aria-label="Toggle password visibility">&#128065;</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="submitBtn">Create Account</button>
        </form>
        <div class="auth-links">
          <a href="login.html">Already have an account? Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
  <script>
    var selectedRole = null;
    var roleSelection = document.getElementById('roleSelection');
    var registerStep = document.getElementById('registerStep');
    var roleLabel = document.getElementById('roleLabel');
    var roleSubtext = document.getElementById('roleSubtext');
    var approvalNotice = document.getElementById('approvalNotice');
    var specGroup = document.getElementById('specializationGroup');
    var form = document.getElementById('registerForm');
    var messageEl = document.getElementById('message');
    var submitBtn = document.getElementById('submitBtn');

    var roleInfo = {
      patient: { label: 'Patient', sub: 'Fill in your details to create an account' },
      doctor: { label: 'Doctor', sub: 'Register as an Neurology specialist' }
    };

    // Role card click
    document.querySelectorAll('.role-card').forEach(function (card) {
      card.addEventListener('click', function () {
        selectedRole = this.getAttribute('data-role');
        roleLabel.textContent = roleInfo[selectedRole].label;
        roleSubtext.textContent = roleInfo[selectedRole].sub;
        submitBtn.textContent = selectedRole === 'doctor' ? 'Send Approval Request' : 'Create Account';
        approvalNotice.style.display = (selectedRole !== 'patient') ? 'block' : 'none';
        specGroup.style.display = (selectedRole === 'doctor') ? 'block' : 'none';
        roleSelection.style.display = 'none';
        registerStep.style.display = 'block';
        document.getElementById('name').focus();
      });
    });

    // Back button
    document.getElementById('backToRoles').addEventListener('click', function () {
      registerStep.style.display = 'none';
      roleSelection.style.display = 'block';
      messageEl.style.display = 'none';
      selectedRole = null;
    });

    // Password toggles
    document.querySelectorAll('.password-toggle').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var input = this.previousElementSibling;
        var isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        this.innerHTML = isPassword ? '&#128064;' : '&#128065;';
      });
    });

    // Register submit
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      clearFieldErrors(form);
      messageEl.style.display = 'none';

      var name = document.getElementById('name').value;
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var confirmPassword = document.getElementById('confirmPassword').value;
      var specialization = document.getElementById('specialization').value.trim();

      var result = validateForm([
        { value: name, fieldName: 'Name', validators: [validateRequired] },
        { value: email, fieldName: 'Email', validators: [validateRequired, validateEmail] },
        { value: password, fieldName: 'Password', validators: [validateRequired, validatePassword] },
        { value: confirmPassword, fieldName: 'ConfirmPassword', validators: [validateRequired] }
      ]);

      if (!result.isValid) {
        for (var field in result.errors) {
          var inputId = field === 'ConfirmPassword' ? 'confirmPassword' : field.toLowerCase();
          var input = document.getElementById(inputId);
          if (input) showFieldError(input, result.errors[field]);
        }
        return;
      }

      if (password !== confirmPassword) {
        showFieldError(document.getElementById('confirmPassword'), 'Passwords do not match');
        return;
      }

      submitBtn.classList.add('btn-loading');
      var originalBtnText = submitBtn.textContent;
      submitBtn.textContent = selectedRole === 'doctor' ? 'Sending Request...' : 'Creating Account...';

      registerUser(name, email, password, selectedRole, specialization)
        .then(function (status) {
          submitBtn.classList.remove('btn-loading');
          submitBtn.textContent = originalBtnText;
          if (status === 'active') {
            messageEl.textContent = 'Registration successful! Your account is active. Redirecting to login...';
            messageEl.className = 'message message-success';
          } else {
            messageEl.textContent = 'Registration submitted! Your account is pending admin approval. You will be notified once approved.';
            messageEl.className = 'message message-success';
          }
          messageEl.style.display = 'block';
          setTimeout(function () { window.location.href = 'login.html'; }, 3000);
        })
        .catch(function (err) {
          submitBtn.classList.remove('btn-loading');
          submitBtn.textContent = originalBtnText;
          messageEl.textContent = err.message || 'Registration failed. Please try again.';
          messageEl.className = 'message message-error';
          messageEl.style.display = 'block';
        });
    });
  </script>
</body>

</html>

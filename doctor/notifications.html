<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../logo.png">
  <title>Notifications - NeuroCare</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin-layout.css">
  <style>
    .notif-card {
      display: flex;
      gap: 16px;
      padding: 1.25rem;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #e2e8f0;
      margin-bottom: 1rem;
      transition: all 0.2s ease;
      position: relative;
    }

    .notif-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .notif-card.card-unread {
      background: #f8faff;
      border-left: 4px solid #3b82f6;
    }

    .notif-icon {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .notif-content {
      flex-grow: 1;
    }

    .notif-msg {
      color: #1e293b;
      font-weight: 500;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .notif-time {
      font-size: 0.8rem;
      color: #64748b;
    }

    .unread-badge {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      width: 8px;
      height: 8px;
      background: #3b82f6;
      border-radius: 50%;
    }
  </style>
</head>

<body class="dashboard-body">
  <!-- Top Navbar -->
  <nav class="dashboard-topnav">
    <div class="topnav-inner">
      <a href="dashboard.html" class="topnav-brand">
        <img src="../logo.png" alt="NeuroCare Logo">
        <span>NeuroCare</span>
      </a>

      <button class="topnav-toggle" id="navToggle" aria-label="Toggle navigation">&#9776;</button>

      <div class="topnav-links" id="navLinks">
        <a href="dashboard.html">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Dashboard
        </a>
        <a href="notifications.html" class="active">
          <svg viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          Notifications <span id="notifBadge" class="nav-badge" style="display:none;">0</span>
        </a>
      </div>

      <a href="#" id="logoutBtn" class="topnav-logout" title="Logout">
        <svg viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        <span>Logout</span>
      </a>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="main-content">
    <header class="page-header">
      <div>
        <h1>Notifications</h1>
        <div class="breadcrumb"><a href="dashboard.html">Dashboard</a> <span>›</span> Notifications</div>
      </div>
    </header>

    <div class="page-body">
      <div id="notifList" class="list-container">
        <!-- Skeletons -->
        <div class="skeleton" style="height:100px; margin-bottom:1rem; border-radius:12px;"></div>
        <div class="skeleton" style="height:100px; margin-bottom:1rem; border-radius:12px;"></div>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/notifications.js"></script>
  <script>
    requireAuth('doctor').then(function (user) {
      setupNotificationBadge(user.uid);

      onNotificationsChange(user.uid, function (notifs) {
        var container = document.getElementById('notifList');
        if (notifs.length === 0) {
          container.innerHTML = '<div class="empty-state"><h3>No Notifications</h3><p>You\'re all caught up!</p></div>';
          return;
        }

        container.innerHTML = '';
        notifs.forEach(function (n) {
          var card = createElement('div', { className: 'notif-card' + (n.read ? '' : ' card-unread') });
          var dateStr = n.createdAt ? formatDate(new Date(n.createdAt.seconds * 1000)) + ' at ' + formatTime(new Date(n.createdAt.seconds * 1000)) : 'Just now';
          
          card.innerHTML = 
            '<div class="notif-icon">' +
              '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>' +
            '</div>' +
            '<div class="notif-content">' +
              '<div class="notif-msg">' + escapeHtml(n.message) + '</div>' +
              '<div class="notif-time">' + dateStr + '</div>' +
            '</div>' +
            (n.read ? '' : '<div class="unread-badge"></div>');

          if (!n.read) {
            card.style.cursor = 'pointer';
            card.addEventListener('click', function () {
              markAsRead(n.id);
            });
          }
          container.appendChild(card);
        });
      });

      document.getElementById('logoutBtn').addEventListener('click', function (e) {
        e.preventDefault();
        confirmLogout();
      });

      // Mobile Toggle
      var navToggle = document.getElementById('navToggle');
      var navLinks = document.getElementById('navLinks');
      if (navToggle && navLinks) {
        navToggle.addEventListener('click', function () {
          navLinks.classList.toggle('open');
        });
      }
    });
  </script>
</body>

</html>

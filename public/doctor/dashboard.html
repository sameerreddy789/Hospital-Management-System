<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/favicon.png">
  <title>Doctor Dashboard - NeuroCare</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin-layout.css"></head>

<body class="dashboard-body">
  <!-- Top Navbar -->
  <nav class="dashboard-topnav">
    <div class="topnav-inner">
      <a href="dashboard.html" class="topnav-brand">
        <img src="../assets/logo.png" alt="NeuroCare Logo">
        <span>NeuroCare</span>
      </a>

      <button class="topnav-toggle" id="navToggle" aria-label="Toggle navigation">&#9776;</button>

      <div class="topnav-links" id="navLinks">
        <a href="dashboard.html" class="active">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Dashboard
        </a>
        <a href="notifications.html">
          <svg viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          Notifications <span id="notifBadge" class="nav-badge" style="display:none;">0</span>
        </a>
      </div>

      <a href="#" id="logoutBtn" class="topnav-logout" title="Logout">
        <svg viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        <span>Logout</span>
      </a>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="main-content">
    <header class="page-header">
      <div>
        <h1 id="doctorGreeting">Doctor Dashboard</h1>
        <div class="breadcrumb">Manage your patient appointments</div>
      </div>
    </header>

    <div class="page-body">
      <!-- Summary Stats -->
      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-card-icon" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;">
            <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </div>
          <div>
            <h3>Today's Appointments</h3>
            <p class="stat" id="todayCount">0</p>
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-card-icon" style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6;">
            <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            </svg>
          </div>
          <div>
            <h3>Assigned Patients</h3>
            <p class="stat" id="assignedCount">0</p>
          </div>
        </div>
      </div>

      <!-- Main Section -->
      <div class="dashboard-section">
        <div class="section-header">
          <div class="tab-nav">
            <button class="tab-btn active" data-tab="active">
              Active Appointments
            </button>
            <button class="tab-btn" data-tab="history">
              Consultation History
            </button>
          </div>
          <div style="display:flex; gap:1rem;">
            <input type="text" id="searchInput" placeholder="Search patient..." class="search-input"
              style="max-width:200px;">
          </div>
        </div>
        <div id="appointmentList" class="list-container">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
      </div>
    </div>
  </main>

  <style>
    /* Clinical Badges */
    .priority-badge { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; margin-left: 8px; vertical-align: middle; }
    .priority-emergency { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; animation: pulse-priority 2s infinite; }
    .priority-urgent { background: #ffedd5; color: #f97316; border: 1px solid #fed7aa; }
    .priority-normal { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }

    @keyframes pulse-priority {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .type-badge { font-size: 0.7rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: #e0e7ff; color: #4338ca; border: 1px solid #c7d2fe; margin-right: 6px; }

    .desc-snippet { font-size: 0.82rem; color: #475569; margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; max-width: 400px; }
    .tab-nav {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .tab-btn {
      padding: 0.75rem 1.5rem;
      border: none;
      background: none;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn.active {
      color: #3b82f6;
      border-bottom-color: #3b82f6;
    }

    .tab-btn:hover:not(.active) {
      color: #1e293b;
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/firestore.js"></script>
  <script src="../js/search-filter.js"></script>
  <script>
    requireAuth('doctor').then(function (user) {
      document.getElementById('doctorGreeting').textContent = 'Good Day, Dr. ' + user.name.split(' ').pop() + '!';

      var container = document.getElementById('appointmentList');
      var allAppointments = [];
      var currentTab = 'active';

      function renderAppointments(items) {
        if (items.length === 0) {
          var msg = currentTab === 'active' ? 'You have no assigned appointments.' : 'No completed consultations found.';
          container.innerHTML = '<div class="empty-state"><h3>No Data</h3><p>' + msg + '</p></div>';
          return;
        }
        container.innerHTML = '';
        items.forEach(function (apt) {
          var card = createElement('div', { className: 'card list-row' });
          var initials = (apt.patientName || '?').charAt(0).toUpperCase();
          var badgeClass = apt.status === 'prescribed' ? 'success' : 'primary';
          var statusLabel = apt.status === 'prescribed' ? 'Completed' : 'Assigned';
          
          var urgency = apt.urgency || 'Normal';
          var urgencyClass = 'priority-' + urgency.toLowerCase();
          var urgencyBadge = urgency !== 'Normal' ? '<span class="priority-badge ' + urgencyClass + '">' + urgency + '</span>' : '';
          
          var typeBadge = apt.type === 'follow-up' ? '<span class="type-badge">Follow-up</span>' : '';
          var descSnippet = apt.problemDescription ? '<div class="desc-snippet">' + escapeHtml(apt.problemDescription) + '</div>' : '';

          card.innerHTML =
            '<div class="list-row-info">' +
            '<div class="list-row-avatar">' + initials + '</div>' +
            '<div>' +
            '<strong>' + escapeHtml(apt.patientName) + '</strong>' + urgencyBadge +
            '<br><span style="font-size:0.85rem; color:#64748b;">' + typeBadge + escapeHtml(apt.problemTitle || 'N/A') + '</span>' +
            descSnippet +
            '</div>' +
            '</div>' +
            '<div class="list-row-meta" style="text-align:right;">' +
            '<span style="font-weight:600; color:#1e293b;">' + formatDate(apt.scheduledDate) + '</span>' +
            '<br><span style="font-size:0.85rem; color:#64748b;">' + formatTime(apt.scheduledTime) + '</span>' +
            '<br><span class="badge badge-sm badge-' + badgeClass + '" style="margin-top:4px;">' + statusLabel + '</span>' +
            '</div>' +
            '<div class="list-row-actions">' +
            '<a href="patient-details.html?appointmentId=' + apt.id + '&patientId=' + apt.patientId + '" class="btn btn-primary btn-sm">' + 
              (currentTab === 'history' ? 'View Records' : 'Start Consultation') + 
            '</a>' +
            '</div>';
          container.appendChild(card);
        });
      }

      function doFilter() {
        var text = document.getElementById('searchInput').value;
        var filteredByTab = allAppointments.filter(function(a) {
          if (currentTab === 'active') return a.status === 'assigned';
          if (currentTab === 'history') return a.status === 'prescribed' || a.status === 'completed';
          return false;
        });
        renderAppointments(applyFilters(filteredByTab, text, 'patientName', 'all'));
      }

      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
          this.classList.add('active');
          currentTab = this.dataset.tab;
          doFilter();
        });
      });

      // Real-time stats
      onStatsChange('doctor', user.uid, function (stats) {
        if (stats.todayCount !== undefined) document.getElementById('todayCount').textContent = stats.todayCount;
        if (stats.assignedCount !== undefined) document.getElementById('assignedCount').textContent = stats.assignedCount;
      });

      // Real-time appointments
      onAppointmentsChange(user.uid, 'doctor', function (appointments) {
        allAppointments = appointments;
        doFilter();
      });

      document.getElementById('searchInput').addEventListener('input', doFilter);

      document.getElementById('logoutBtn').addEventListener('click', function (e) { e.preventDefault(); confirmLogout(); });

      var navToggle = document.getElementById('navToggle');
      var navLinks = document.getElementById('navLinks');
      if (navToggle && navLinks) {
        navToggle.addEventListener('click', function () { navLinks.classList.toggle('open'); });
      }
    });
  </script>
</body>

</html>
